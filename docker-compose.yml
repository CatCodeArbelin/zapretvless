services:
  dev:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -lc '
        set -euo pipefail;
        mapfile -t projects < <(find . -type f -name "*.csproj"
          ! -path "./.git/*"
          ! -iname "*wpf*.csproj"
          ! -iname "*ui*.csproj"
          ! -iname "*windows*.csproj" | sort);
        if [ "$${#projects[@]}" -eq 0 ]; then
          echo "No cross-platform .NET projects found; safe checks skipped.";
          exit 0;
        fi;
        for project in "$${projects[@]}"; do
          case "$${project}" in
            *Arbelin.One.Shared.csproj|*Arbelin.One.Tests.csproj|*Backend*.csproj|*MockApi*.csproj|*Mock.API*.csproj|*Api*.csproj)
              echo "Running safe checks for $${project}";
              dotnet restore "$${project}";
              dotnet build "$${project}" --no-restore;
              dotnet test "$${project}" --no-build --no-restore;
              ;;
            *)
              echo "Skipping $${project}; not in the cross-platform safe-check allowlist.";
              ;;
          esac;
        done
      '

  strategy-api:
    image: nginx:alpine
    volumes:
      - ./configs/strategies:/usr/share/nginx/html/strategies:ro
    ports:
      - "18080:80"
